<!DOCTYPE html>
<!--
  Codex 橙皮书 · PDF 封面（杂志编辑风）
  独立、自包含文件：不依赖任何外部图片或字体资源，可单独在浏览器打开预览，
  也会被 build_pdf.py 取出 <body> 内容作为导出 PDF 的第一页。
  页面尺寸严格对齐 A4（210mm × 297mm）。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Codex 橙皮书 · 封面</title>
<style>
  /* ===== 基础变量：橙皮书主题配色 ===== */
  :root {
    --ink: #16130f;          /* 近黑正文色 */
    --ink-soft: #4b463f;     /* 次级灰 */
    --orange: #f2660a;       /* 主橙 */
    --orange-deep: #c64e00;  /* 深橙 */
    --line: #ddd7cf;         /* 细分隔线 */
    --paper: #ffffff;        /* 纸白底 */
  }

  /* ===== 打印页设置：A4，无页边距（边距由内容框控制） ===== */
  @page { size: A4; margin: 0; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 210mm;
    height: 297mm;
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang SC", "Songti SC", -apple-system, "Helvetica Neue", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* 整张封面的内容框：杂志式大留白 */
  .cover {
    position: relative;
    width: 210mm;
    height: 297mm;
    padding: 20mm 18mm;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 左侧贯穿全页的细橙色竖条，编辑风的视觉锚点 */
  .cover::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 8mm; height: 100%;
    background: var(--orange);
  }

  /* ===== 顶部页眉行：刊头 + 版本 ===== */
  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 5mm;
    border-bottom: 1.4px solid var(--ink);
    letter-spacing: 0.18em;
  }
  .masthead .brand {
    font-size: 12pt;
    font-weight: 700;
    text-transform: uppercase;
  }
  .masthead .brand .dot { color: var(--orange); }
  .masthead .issue {
    font-size: 9.5pt;
    color: var(--ink-soft);
    letter-spacing: 0.22em;
  }

  /* ===== 中部：超大标题区 ===== */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .kicker {
    font-size: 10.5pt;
    letter-spacing: 0.34em;
    color: var(--orange-deep);
    text-transform: uppercase;
    margin-bottom: 8mm;
  }

  .title {
    font-weight: 800;
    line-height: 0.96;
    letter-spacing: -0.01em;
  }
  .title .en {
    display: block;
    font-size: 58pt;
    color: var(--orange);
    letter-spacing: 0.005em;
  }
  .title .zh {
    display: block;
    font-size: 92pt;
    color: var(--ink);
    margin-top: 1mm;
  }

  /* 标题下的粗橙色色块 + 副标题 */
  .subtitle {
    margin-top: 10mm;
    display: flex;
    align-items: center;
    gap: 6mm;
  }
  .subtitle .bar {
    flex: none;
    width: 26mm; height: 6px;
    background: var(--orange);
  }
  .subtitle .text {
    font-size: 16pt;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .tagline {
    margin-top: 5mm;
    font-size: 11pt;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
  }

  /* 作者署名：编辑风的细标签 + 名字加重 */
  .byline {
    margin-top: 7mm;
    font-size: 11pt;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
  }
  .byline .tag {
    color: var(--orange-deep);
    letter-spacing: 0.22em;
    font-size: 9.5pt;
    margin-right: 3mm;
  }
  .byline .name {
    color: var(--ink);
    font-weight: 700;
    font-size: 14pt;
    letter-spacing: 0.04em;
  }

  /* ===== 底部：编辑式目录索引 + 元信息 ===== */
  .footer {
    border-top: 1.4px solid var(--ink);
    padding-top: 5mm;
  }

  /* 五个篇章的横排索引，模仿杂志栏目导引 */
  .index {
    display: flex;
    justify-content: space-between;
    gap: 4mm;
    margin-bottom: 7mm;
  }
  .index .item {
    flex: 1;
    border-top: 3px solid var(--orange);
    padding-top: 2.5mm;
  }
  .index .item .no {
    font-size: 9pt;
    font-weight: 700;
    color: var(--orange-deep);
    letter-spacing: 0.1em;
  }
  .index .item .label {
    display: block;
    margin-top: 1.5mm;
    font-size: 9.5pt;
    color: var(--ink);
    line-height: 1.35;
  }

  .meta {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .meta .audience {
    font-size: 9.5pt;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 120mm;
  }
  .meta .audience strong { color: var(--ink); font-weight: 700; }
  .meta .version {
    text-align: right;
    flex: none;
  }
  .meta .version .v {
    font-size: 20pt;
    font-weight: 800;
    color: var(--orange);
    letter-spacing: 0.04em;
  }
  .meta .version .date {
    font-size: 9pt;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
    margin-top: 1mm;
  }
</style>
</head>
<body>
  <div class="cover">

    <!-- 页眉：刊头与版本 -->
    <header class="masthead">
      <span class="brand">CODEX<span class="dot"> · </span>ORANGE BOOK</span>
      <span class="issue">NON-OFFICIAL GUIDE / 非官方指南</span>
    </header>

    <!-- 主标题区 -->
    <section class="hero">
      <div class="kicker">写给开发者与 AI 工具重度用户的使用手册</div>
      <h1 class="title">
        <span class="en">Codex</span>
        <span class="zh">橙皮书</span>
      </h1>
      <div class="subtitle">
        <span class="bar"></span>
        <span class="text">从安装到实战案例的全链路使用指南</span>
      </div>
      <div class="tagline">非官方开源指南 · 持续更新版</div>
      <div class="byline"><span class="tag">编著 / BY</span><span class="name">泊舟</span></div>
    </section>

    <!-- 页脚：篇章索引 + 元信息 -->
    <footer class="footer">
      <nav class="index">
        <div class="item"><span class="no">01</span><span class="label">认识 Codex</span></div>
        <div class="item"><span class="no">02</span><span class="label">安装与配置</span></div>
        <div class="item"><span class="no">03</span><span class="label">核心功能</span></div>
        <div class="item"><span class="no">04</span><span class="label">标准工作流</span></div>
        <div class="item"><span class="no">05</span><span class="label">实战案例库</span></div>
      </nav>
      <div class="meta">
        <p class="audience">
          适合<strong>零基础上手</strong>、想把 Codex 接入真实项目，<br>
          以及对比 Cursor / Claude Code 工作流的开发者与独立开发者。
        </p>
        <div class="version">
          <div class="v">v0.1.0</div>
          <div class="date">2026 · 06</div>
        </div>
      </div>
    </footer>

  </div>
</body>
</html>
